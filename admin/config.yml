# Настройка админ-панели Decap CMS для сайта МотоГОСТ
backend:
  name: github
  repo: kaARAss/motogost
  branch: main
  base_url: https://functions.yandexcloud.net
  auth_endpoint: d4ehp7io5egiqroikpb4

locale: ru

# Куда админка загружает фото
media_folder: images
public_folder: /images

collections:
  - name: content
    label: Контент сайта
    files:
      - file: content/season.json
        name: season
        label: "Зимний режим (сезон)"
        fields:
          - { label: "ВКЛЮЧИТЬ зимний режим на сайте", name: enabled, widget: boolean, default: false, hint: "Главный выключатель. Вкл — на сайте появляется зимнее оформление; выкл — всё скрывается." }
          - { label: "Снегопад", name: snow, widget: boolean, default: true, hint: "Падающий снег по всему сайту." }
          - { label: "Гирлянда вверху", name: garland, widget: boolean, default: true, hint: "Светящаяся гирлянда под шапкой сайта." }
          - { label: "Колпак Деда Мороза на логотипе", name: hat, widget: boolean, default: true, hint: "Новогодний колпак на логотипе." }
          - { label: "Иконка в верхней плашке (эмодзи)", name: icon, widget: string, required: false, default: "❄️", hint: "Эмодзи в синей плашке вверху, напр. ❄️" }
          - { label: "Заголовок верхней плашки", name: title, widget: string, hint: "Текст жирным в плашке вверху, напр. «Зимний сезон открыт»" }
          - { label: "Текст верхней плашки", name: text, widget: text, hint: "Пояснение в плашке вверху (на телефоне скрывается)." }
          - { label: "Показывать зимний раздел", name: secOn, widget: boolean, default: true, hint: "Отдельный красивый блок про зиму на странице." }
          - { label: "Раздел: надпись над заголовком", name: secKicker, widget: string, required: false, default: "Зимний сезон" }
          - { label: "Раздел: заголовок", name: secTitle, widget: string, required: false, default: "Зимой у нас не менее жарко" }
          - { label: "Раздел: описание", name: secLead, widget: text, required: false }
          - label: "Раздел: карточки"
            name: cards
            widget: list
            required: false
            label_singular: "Карточка"
            hint: "Каждая карточка — иконка + заголовок + текст. Можно добавлять, удалять и перетаскивать."
            fields:
              - { label: "Иконка", name: icon, widget: select, default: "snow", options: [ { label: "Шина/шипы", value: "tire" }, { label: "Горы", value: "mountain" }, { label: "Огонь/драйв", value: "fire" }, { label: "Снежинка", value: "snow" }, { label: "Щит/защита", value: "shield" }, { label: "Маршрут", value: "route" }, { label: "Термометр", value: "thermo" }, { label: "Молния", value: "bolt" } ] }
              - { label: "Заголовок", name: title, widget: string }
              - { label: "Текст", name: text, widget: text }
              - { label: "Картинка карточки", name: img, widget: image, required: false, hint: "Фото вверху карточки зимнего блока (необязательно)." }
          - { label: "Текст кнопки в разделе", name: ctaText, widget: string, required: false, default: "Записаться на зимний заезд" }
          - { label: "Куда ведёт кнопка", name: ctaHref, widget: string, required: false, default: "#lead", hint: "Якорь или ссылка. По умолчанию #lead (блок заявки)." }
      - file: content/hero.json
        name: hero
        label: "Главный экран"
        fields:
          - { label: "Надпись сверху", name: eyebrow, widget: string, hint: "Маленькая оранжевая надпись над большим заголовком" }
          - { label: "Подзаголовок", name: subtitle, widget: string, hint: "Строка под заголовком «ЭНДУРО» на первом экране" }
          - { label: "Кнопка 1", name: btnPrimary, widget: string, hint: "Текст на главной оранжевой кнопке" }
          - { label: "Кнопка 2", name: btnGhost, widget: string, hint: "Текст на второй прозрачной кнопке" }
          - { label: "Куда ведёт Кнопка 1", name: btnPrimaryHref, widget: string, required: false, hint: "Ссылка или якорь. По умолчанию #lead." }
          - { label: "Куда ведёт Кнопка 2", name: btnGhostHref, widget: string, required: false, hint: "Ссылка или якорь. По умолчанию #tours." }
          - { label: "Фото главного экрана (десктоп)", name: image, widget: image, required: false, hint: "Большое фото на первом экране (для компьютеров)." }
          - { label: "Фото главного экрана (телефоны)", name: imageMobile, widget: image, required: false, hint: "Фото первого экрана на телефонах (необязательно)." }
      - file: content/about.json
        name: about
        label: "О нас"
        fields:
          - { label: "Надпись", name: kicker, widget: string, hint: "Маленькая оранжевая надпись над заголовком раздела «О нас»" }
          - { label: "Заголовок", name: title, widget: string, hint: "Заголовок раздела «О нас»" }
          - { label: "Абзац 1", name: p1, widget: text, hint: "Первый абзац описания" }
          - { label: "Абзац 2", name: p2, widget: text, hint: "Второй абзац (можно оставить пустым)" }
          - { label: "Абзац 3", name: p3, widget: text, hint: "Третий абзац (можно оставить пустым)" }
          - { label: "Слоган", name: legend, widget: string, hint: "Яркая фраза-слоган в конце блока" }
          - { label: "Кнопка", name: cta, widget: string, hint: "Текст кнопки под разделом" }
          - { label: "Куда ведёт кнопка", name: ctaHref, widget: string, required: false, hint: "Ссылка или якорь. По умолчанию #contacts." }
          - { label: "Фото секции", name: image, widget: image, required: false, hint: "Фото справа от текста «О нас»" }
      - file: content/services.json
        name: services
        label: "Услуги и цены"
        fields:
          - label: "Карточки услуг"
            name: items
            widget: list
            label_singular: "Услуга"
            hint: "Каждая карточка — отдельная услуга. Можно добавлять, удалять и перетаскивать порядок."
            fields:
              - { label: "Название", name: title, widget: string, hint: "Название услуги" }
              - { label: "Характеристики", name: specs, widget: string, hint: "Короткая строка под названием" }
              - { label: "Краткое описание", name: teaser, widget: text, hint: "1–2 предложения на карточке" }
              - { label: "Цена", name: price, widget: string, hint: "Например «от 1 250 ₽/час»" }
              - { label: "Фото", name: image, widget: image, required: false, hint: "Картинка на карточке и в подробном окне" }
              - { label: "Вводный абзац (в окне «Подробнее»)", name: intro, widget: text, required: false, hint: "Необязательно. Короткий абзац над списком пунктов." }
              - label: "Подробные пункты (в окне «Подробнее»)"
                name: details
                widget: list
                required: false
                label_singular: "Пункт"
                hint: "Каждый пункт — отдельная строка списка. Жирный текст: оберни во **две звёздочки**."
                field: { label: "Пункт", name: item, widget: string }
      - file: content/contacts.json
        name: contacts
        label: "Контакты"
        fields:
          - { label: "Адрес", name: address, widget: string, hint: "Адрес базы" }
          - { label: "Примечание к адресу", name: addressNote, widget: string, hint: "Пояснение под адресом" }
          - { label: "Телефон (текст)", name: phoneText, widget: string, hint: "Как номер показывается" }
          - { label: "Телефон (ссылка tel:)", name: phoneHref, widget: string, hint: "Для клика: без пробелов" }
          - { label: "Telegram группа — ссылка", name: tgGroup, widget: string, hint: "Полная ссылка" }
          - { label: "Telegram группа — текст", name: tgGroupText, widget: string, hint: "Подпись ссылки" }
          - { label: "Telegram личные — ссылка", name: tgDm, widget: string, hint: "Ссылка на личный чат" }
          - { label: "Telegram личные — текст", name: tgDmText, widget: string, hint: "Подпись ссылки" }
          - { label: "ВКонтакте — ссылка", name: vk, widget: string, hint: "Полная ссылка" }
          - { label: "ВКонтакте — текст", name: vkText, widget: string, hint: "Подпись ссылки" }
          - { label: "MAX — ссылка (в блоке заявки)", name: max, widget: string, required: false, hint: "Ссылка на мессенджер MAX." }
          - { label: "Телефон плавающей кнопки (tel:)", name: fabPhone, widget: string, required: false, hint: "Номер на круглой кнопке связи." }
      - file: content/gallery.json
        name: gallery
        label: "Галерея"
        fields:
          - label: "Фотографии (по порядку)"
            name: images
            widget: list
            label_singular: "Фото"
            hint: "Фото галереи. Перетаскивай для изменения порядка."
            field: { label: "Фото", name: image, widget: image }
