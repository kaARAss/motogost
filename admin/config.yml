# Настройка админ-панели Decap CMS для сайта МотоГОСТ
backend:
  name: github
  repo: kaARAss/motogost
  branch: main
  base_url: https://functions.yandexcloud.net
  auth_endpoint: d4ehp7io5egiqroikpb4

locale: ru

# Куда админка загружает фото
media_folder: images
public_folder: /images

collections:
  - name: content
    label: Контент сайта
    files:
      - file: content/season.json
        name: season
        label: "Сезонный блок (зима/лето)"
        fields:
          - { label: "Показывать блок на сайте", name: enabled, widget: boolean, default: false, hint: "Включи — и блок появится на сайте. Выключи — спрячется." }
          - { label: "Иконка (эмодзи)", name: icon, widget: string, required: false, default: "❄️", hint: "Эмодзи рядом с заголовком блока, например ❄️ или ☀️" }
          - { label: "Заголовок", name: title, widget: string, hint: "Крупный заголовок сезонного блока" }
          - { label: "Текст", name: text, widget: text, hint: "Описание под заголовком (например, про зимние заезды и шипы)" }
      - file: content/hero.json
        name: hero
        label: "Главный экран"
        fields:
          - { label: "Надпись сверху", name: eyebrow, widget: string, hint: "Маленькая оранжевая надпись над большим заголовком (напр. «Экстрим-клуб в горах Урала»)" }
          - { label: "Подзаголовок", name: subtitle, widget: string, hint: "Строка под заголовком «ЭНДУРО» на первом экране" }
          - { label: "Кнопка 1", name: btnPrimary, widget: string, hint: "Текст на главной оранжевой кнопке (напр. «Записаться на заезд»)" }
          - { label: "Кнопка 2", name: btnGhost, widget: string, hint: "Текст на второй прозрачной кнопке (напр. «Смотреть туры»)" }
          - { label: "Куда ведёт Кнопка 1", name: btnPrimaryHref, widget: string, required: false, hint: "Ссылка или якорь. По умолчанию #lead (раздел заявки). Можно вставить ссылку на соцсеть/мессенджер." }
          - { label: "Куда ведёт Кнопка 2", name: btnGhostHref, widget: string, required: false, hint: "Ссылка или якорь. По умолчанию #tours (раздел услуг)." }
          - { label: "Фото главного экрана (десктоп)", name: image, widget: image, required: false, hint: "Большое фото на первом экране (для компьютеров)." }
          - { label: "Фото главного экрана (телефоны)", name: imageMobile, widget: image, required: false, hint: "Фото первого экрана на телефонах (необязательно)." }
      - file: content/about.json
        name: about
        label: "О нас"
        fields:
          - { label: "Надпись", name: kicker, widget: string, hint: "Маленькая оранжевая надпись над заголовком раздела «О нас»" }
          - { label: "Заголовок", name: title, widget: string, hint: "Заголовок раздела «О нас»" }
          - { label: "Абзац 1", name: p1, widget: text, hint: "Первый абзац описания" }
          - { label: "Абзац 2", name: p2, widget: text, hint: "Второй абзац (можно оставить пустым)" }
          - { label: "Абзац 3", name: p3, widget: text, hint: "Третий абзац (можно оставить пустым)" }
          - { label: "Слоган", name: legend, widget: string, hint: "Яркая фраза-слоган в конце блока" }
          - { label: "Кнопка", name: cta, widget: string, hint: "Текст кнопки под разделом (напр. «Получить консультацию»)" }
          - { label: "Куда ведёт кнопка", name: ctaHref, widget: string, required: false, hint: "Ссылка или якорь. По умолчанию #contacts (раздел контактов). Можно вставить ссылку на соцсеть/мессенджер." }
          - { label: "Фото секции", name: image, widget: image, required: false, hint: "Фото справа от текста «О нас»" }
      - file: content/services.json
        name: services
        label: "Услуги и цены"
        fields:
          - label: "Карточки услуг"
            name: items
            widget: list
            label_singular: "Услуга"
            hint: "Каждая карточка — отдельная услуга. Можно добавлять, удалять и перетаскивать порядок."
            fields:
              - { label: "Название", name: title, widget: string, hint: "Название услуги" }
              - { label: "Характеристики", name: specs, widget: string, hint: "Короткая строка под названием (напр. «Kayo Evo · 140/125 куб»)" }
              - { label: "Краткое описание", name: teaser, widget: text, hint: "1–2 предложения на карточке" }
              - { label: "Цена", name: price, widget: string, hint: "Например «от 1 250 ₽/час»" }
              - { label: "Фото", name: image, widget: image, required: false, hint: "Картинка на карточке и в подробном окне" }
              - { label: "Вводный абзац (в окне «Подробнее»)", name: intro, widget: text, required: false, hint: "Необязательно. Короткий абзац над списком пунктов." }
              - label: "Подробные пункты (в окне «Подробнее»)"
                name: details
                widget: list
                required: false
                label_singular: "Пункт"
                hint: "Каждый пункт — отдельная строка списка. Жирный текст: оберни во **две звёздочки**."
                field: { label: "Пункт", name: item, widget: string }
      - file: content/contacts.json
        name: contacts
        label: "Контакты"
        fields:
          - { label: "Адрес", name: address, widget: string, hint: "Адрес базы (напр. «Посёлок Северка, ул. Победы, 8»)" }
          - { label: "Примечание к адресу", name: addressNote, widget: string, hint: "Пояснение под адресом (напр. про направление)" }
          - { label: "Телефон (текст)", name: phoneText, widget: string, hint: "Как номер показывается: «+7 (958) 578-67-86»" }
          - { label: "Телефон (ссылка tel:)", name: phoneHref, widget: string, hint: "Для клика: без пробелов, напр. «tel:+79585786786»" }
          - { label: "Telegram группа — ссылка", name: tgGroup, widget: string, hint: "Полная ссылка, напр. https://t.me/MotoGost96" }
          - { label: "Telegram группа — текст", name: tgGroupText, widget: string, hint: "Подпись ссылки (напр. «Группа Telegram»)" }
          - { label: "Telegram личные — ссылка", name: tgDm, widget: string, hint: "Ссылка на личный чат" }
          - { label: "Telegram личные — текст", name: tgDmText, widget: string, hint: "Подпись ссылки (напр. «Личные сообщения»)" }
          - { label: "ВКонтакте — ссылка", name: vk, widget: string, hint: "Полная ссылка, напр. https://vk.com/motogost96" }
          - { label: "ВКонтакте — текст", name: vkText, widget: string, hint: "Подпись ссылки (напр. «Мы ВКонтакте»)" }
          - { label: "MAX — ссылка (в блоке заявки)", name: max, widget: string, required: false, hint: "Ссылка на мессенджер MAX (кнопка MAX в блоке заявки)." }
          - { label: "Телефон плавающей кнопки (tel:)", name: fabPhone, widget: string, required: false, hint: "Номер на круглой кнопке связи внизу справа. Без пробелов, напр. tel:+79995656430" }
      - file: content/gallery.json
        name: gallery
        label: "Галерея"
        fields:
          - label: "Фотографии (по порядку)"
            name: images
            widget: list
            label_singular: "Фото"
            hint: "Фото галереи. Перетаскивай для изменения порядка."
            field: { label: "Фото", name: image, widget: image }
